# Azure Developer CLI (azd) configuration.
# `azd up` provisions the infra in infra/main.bicep and deploys this app.
name: fde-tracker
metadata:
  template: fde-tracker@1.0.0

# After infra is provisioned, apply the Prisma schema and seed demo data
# against the freshly-created Azure PostgreSQL (uses the DATABASE_URL output).
hooks:
  postprovision:
    posix:
      shell: sh
      continueOnError: false
      interactive: false
      run: |
        echo "→ Applying schema & seeding demo data to Azure PostgreSQL…"
        npm ci
        npx prisma db push --skip-generate
        npm run seed
    windows:
      shell: pwsh
      continueOnError: false
      interactive: false
      run: |
        Write-Host "→ Applying schema & seeding demo data to Azure PostgreSQL…"
        npm ci
        npx prisma db push --skip-generate
        npm run seed

services:
  web:
    project: .
    language: js
    host: appservice
    # Build on the deploy machine (GitHub runner — fast, plenty of RAM) instead
    # of on the small B1 App Service instance. App Service then only runs the
    # prebuilt app (SCM_DO_BUILD_DURING_DEPLOYMENT=false in main.bicep).
    hooks:
      prepackage:
        posix:
          shell: sh
          run: npm run build
        windows:
          shell: pwsh
          run: npm run build
