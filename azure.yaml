# Azure Developer CLI (azd) configuration.
# `azd up` provisions the infra in infra/main.bicep and deploys this app.
name: fde-tracker
metadata:
  template: fde-tracker@1.0.0

# After infra is provisioned, apply the Prisma schema and seed demo data
# against the freshly-created Azure PostgreSQL (uses the DATABASE_URL output).
hooks:
  postprovision:
    posix:
      shell: sh
      continueOnError: false
      interactive: false
      run: |
        echo "→ Applying schema & seeding demo data to Azure PostgreSQL…"
        npm ci
        npx prisma db push --skip-generate
        npm run seed
    windows:
      shell: pwsh
      continueOnError: false
      interactive: false
      run: |
        Write-Host "→ Applying schema & seeding demo data to Azure PostgreSQL…"
        npm ci
        npx prisma db push --skip-generate
        npm run seed

services:
  web:
    project: .
    language: js
    host: appservice
    # Deploy only the self-contained Next.js "standalone" bundle built by the
    # prepackage hook below. It contains server.js + a bundled node_modules
    # (real files, not .bin symlinks), so App Service runs it directly with
    # `node server.js` — no server-side build, no reliance on a shipped
    # project node_modules (see main.bicep appCommandLine).
    dist: .next/standalone
    hooks:
      prepackage:
        posix:
          shell: sh
          run: |
            set -e
            BUILD_STANDALONE=1 npm run build
            # public/ and .next/static are NOT traced into standalone — copy them in.
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/
            # Prisma query engine + client are often missed by output tracing —
            # copy them explicitly so runtime DB queries work.
            mkdir -p .next/standalone/node_modules/@prisma .next/standalone/node_modules/.prisma
            cp -r node_modules/@prisma/. .next/standalone/node_modules/@prisma/
            cp -r node_modules/.prisma/. .next/standalone/node_modules/.prisma/
        windows:
          shell: pwsh
          run: |
            $env:BUILD_STANDALONE = "1"; npm run build
            Copy-Item -Recurse -Force public .next/standalone/public
            Copy-Item -Recurse -Force .next/static .next/standalone/.next/static
            New-Item -ItemType Directory -Force .next/standalone/node_modules/@prisma, .next/standalone/node_modules/.prisma | Out-Null
            Copy-Item -Recurse -Force node_modules/@prisma/* .next/standalone/node_modules/@prisma/
            Copy-Item -Recurse -Force node_modules/.prisma/* .next/standalone/node_modules/.prisma/
