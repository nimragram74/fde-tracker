# Azure Developer CLI (azd) configuration.
# `azd up` provisions the infra in infra/main.bicep and deploys this app.
#
# Azure App Service (Oryx) installs dependencies and runs the Next.js build on
# the server (SCM_DO_BUILD_DURING_DEPLOYMENT=true in main.bicep). The app applies
# the Prisma schema on boot (see main.bicep appCommandLine) — no build/deploy
# hooks needed here.
name: fde-tracker
metadata:
  template: fde-tracker@1.0.0

services:
  web:
    project: .
    language: js
    host: appservice
