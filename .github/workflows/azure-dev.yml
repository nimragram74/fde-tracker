# CI/CD via Azure Developer CLI (azd) with OIDC federated credentials.
# One-time setup: run `azd pipeline config` locally to create the federated
# app registration and populate the repo secrets/variables referenced below.
name: Deploy (azd)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      # Secrets used by Bicep parameters:
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_MICROSOFT_ENTRA_ID_ID: ${{ vars.AUTH_MICROSOFT_ENTRA_ID_ID }}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: ${{ vars.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}
      ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Log in with azd (OIDC)
        run: azd auth login --client-id "$AZURE_CLIENT_ID" --federated-credential-provider "github" --tenant-id "$AZURE_TENANT_ID"
      - name: Provision & deploy
        run: azd up --no-prompt
